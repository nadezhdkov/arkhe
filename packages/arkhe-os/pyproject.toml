[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arkhe-os"
dynamic = ["version"]
description = "OS, console, input and CLI utilities for Arkhe."
requires-python = ">=3.10"
dependencies = [
  "arkhe-core",
  "typer>=0.12"
]

[tool.hatch.version]
path = "../arkhe-core/src/arkhe/version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/arkhe"]

[tool.uv.sources]
arkhe-core = { workspace = true }
arkhe-meta = { workspace = true }
arkhe-config = { workspace = true }
arkhe-net = { workspace = true }
arkhe-math = { workspace = true }
arkhe-game = { workspace = true }
arkhe-web = { workspace = true }
arkhe-log = { workspace = true }
arkhe-scheduler = { workspace = true }
arkhe-db = { workspace = true }
