[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arkhe-config"
dynamic = ["version"]
description = "Configuration management (YAML, JSON, Env) for the Arkhe framework."
requires-python = ">=3.10"
dependencies = [
  "arkhe-core",
  "pyyaml>=6.0",
  "python-dotenv>=1.0"
]

[tool.hatch.version]
path = "../arkhe-core/src/arkhe/version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/arkhe"]

[tool.uv.sources]
arkhe-core = { workspace = true }
arkhe-meta = { workspace = true }
arkhe-net = { workspace = true }
arkhe-math = { workspace = true }
arkhe-game = { workspace = true }
arkhe-web = { workspace = true }
arkhe-os = { workspace = true }
arkhe-log = { workspace = true }
arkhe-scheduler = { workspace = true }
arkhe-db = { workspace = true }
