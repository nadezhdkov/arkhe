[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arkhe-core"
dynamic = ["version"]
description = "Core utilities and types for the Arkhe framework."
requires-python = ">=3.10"
dependencies = []

[tool.hatch.version]
path = "src/arkhe/version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/arkhe"]

[tool.uv.sources]
arkhe-meta = { workspace = true }
arkhe-config = { workspace = true }
arkhe-net = { workspace = true }
arkhe-math = { workspace = true }
arkhe-game = { workspace = true }
arkhe-web = { workspace = true }
arkhe-os = { workspace = true }
arkhe-log = { workspace = true }
arkhe-scheduler = { workspace = true }
arkhe-db = { workspace = true }
